name: room_share
description: "RoomShare is a vibrant student housing community app built with Flutter, allowing students to easily find and connect directly with owners posting room and PG availabilities."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  flutter_svg: ^2.0.0
  intl: 0.20.2
  url_launcher: ^6.3.0
  image_picker: '>=1.1.2'
  flutter_riverpod: ^2.6.1
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.2
  go_router: ^16.2.0
  supabase: ^2.10.2
  supabase_flutter: ^2.12.0
  google_sign_in: ^7.2.0
  cached_network_image: ^3.3.1  # smooth image loading with cache
  shimmer: ^3.0.0      
  slide_to_act: ^2.0.2
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/dreamflow_icon.jpg
  remove_alpha_ios: true
